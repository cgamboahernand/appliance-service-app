@if (isOpen()) {
  <div class="chat-panel">
    <div class="chat-header">
      <span class="chat-title">💬 AI Assistant</span>
      <button class="chat-close" (click)="close()">✕</button>
    </div>

    <div class="chat-messages" #messagesContainer>
      @if (messages().length === 0) {
        <div class="chat-empty">
          <p>👋 Hi! Tell me about any appliance issue you're experiencing.</p>
        </div>
      }

      @for (msg of messages(); track msg.id) {
        @if (msg.role === 'user') {
          <div class="chat-bubble bubble-user">{{ msg.content }}</div>
        } @else {
          <div class="chat-bubble bubble-assistant" [innerHTML]="renderMarkdown(msg.content)"></div>
        }
      }

      @if (isTyping()) {
        <div class="chat-bubble bubble-assistant typing">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      }
    </div>

    <div class="chat-input">
      <input
        type="text"
        [(ngModel)]="inputText"
        (keydown)="onKeydown($event)"
        placeholder="Type a message..."
        autocomplete="off"
      />
      <button class="send-btn" (click)="send()" [disabled]="!inputText.trim()">
        ▶
      </button>
    </div>
  </div>
}

<button class="chat-fab" (click)="toggle()" [class.open]="isOpen()">
  @if (isOpen()) {
    ✕
  } @else {
    💬
  }
</button>
