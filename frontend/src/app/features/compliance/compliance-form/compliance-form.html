@if (submitted()) {
  <div class="confirmation">
    <div class="confirmation-icon">✓</div>
    <h2>Compliance Filed Successfully</h2>
    <p>Your compliance report has been submitted and is now <strong>Pending</strong> review.</p>
    <button class="btn btn-primary" (click)="goToList()">View All Compliances</button>
  </div>
} @else {
  <div class="form-container">
    <h2>File a Compliance Report</h2>
    <p class="subtitle">Report an appliance malfunction or breakage</p>

    <form (ngSubmit)="onSubmit()" #complianceForm="ngForm">
      <div class="form-group">
        <label for="appliance">Appliance <span class="required">*</span></label>
        <select
          id="appliance"
          [(ngModel)]="serialId"
          name="serialId"
          required
        >
          <option value="" disabled>Select an appliance</option>
          @for (item of purchasedAppliances(); track item.serialId) {
            <option [value]="item.serialId">
              {{ item.name }} ({{ item.serial }}) — {{ item.description }}
            </option>
          }
        </select>
      </div>

      <div class="form-group">
        <label for="userName">Your Name <span class="required">*</span></label>
        <input
          id="userName"
          type="text"
          [(ngModel)]="userName"
          name="userName"
          placeholder="Enter your full name"
          required
        />
      </div>

      <div class="form-group">
        <label>Reason <span class="required">*</span></label>
        <div class="radio-group">
          <label class="radio-label">
            <input
              type="radio"
              [(ngModel)]="reason"
              name="reason"
              value="Malfunction"
              required
            />
            <span class="radio-text">Malfunction</span>
            <span class="radio-desc">The appliance is not working correctly</span>
          </label>
          <label class="radio-label">
            <input
              type="radio"
              [(ngModel)]="reason"
              name="reason"
              value="Broken"
            />
            <span class="radio-text">Broken</span>
            <span class="radio-desc">The appliance is physically damaged or non-functional</span>
          </label>
        </div>
      </div>

      <div class="form-group">
        <label for="description">Description <span class="required">*</span></label>
        <textarea
          id="description"
          [(ngModel)]="description"
          name="description"
          rows="4"
          placeholder="Describe the issue in detail..."
          required
        ></textarea>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" (click)="goToList()">Cancel</button>
        <button type="submit" class="btn btn-primary" [disabled]="!isValid">Submit Compliance</button>
      </div>
    </form>
  </div>
}
